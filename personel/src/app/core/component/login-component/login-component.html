<div>
    <form>
        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input #email type="email" class="form-control" id="email" aria-describedby="emailHelp">
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input #pass type="password" class="form-control" id="password">
        </div>

        <button type="button" class="btn btn-primary" (click)="login(email.value, pass.value)">Submit</button>
    </form>
</div>
