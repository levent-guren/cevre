<table border="1">
    <thead>
        <tr>
            <th>id</th>
            <th>name</th>
            <th>username</th>
            <th>email</th>
        </tr>
    </thead>
    <tbody>
        @for (kull of kullaniciListesi(); track kull.id) {
        <tr>
            <td>{{kull.id}}</td>
            <td>{{kull.name}}</td>
            <td>{{kull.username}}</td>
            <td>{{kull.email}}</td>
        </tr>
        }
    </tbody>
</table>
